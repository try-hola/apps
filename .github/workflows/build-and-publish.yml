name: Build and Publish Changed Packages

# Apps live under src/<name>/ and are published to GHCR as LOOSE OCI FILE LAYERS
# (bin/push-oci-package.sh): each top-level file under src/<name>/src/
# (compose.yaml, manifest.json, …) becomes its own layer, so the Hola server's
# `oras pull -o <dir>` gets the files directly. On merge to main we also
# regenerate the root catalog.json index the server consumes via HOLA_CATALOG_URL.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'bin/**'
      - '.github/workflows/build-and-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'bin/**'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Specific package to build (leave empty for auto-detection)'
        required: false
        type: string

jobs:
  # Detect which src/<name> packages changed in this push/PR.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: filter
        run: |
          # Manual trigger with an explicit package name.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.package }}" != "" ]]; then
            CHANGED="[\"${{ github.event.inputs.package }}\"]"
            echo "changes=${CHANGED}" >> $GITHUB_OUTPUT
            echo "Manually selected package: ${CHANGED}"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          # Unique src/<name> dirs with changes, as a JSON array.
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep "^src/" | cut -d/ -f2 | sort -u | jq -R . | jq -s -c .)
          echo "changes=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed packages: ${CHANGED}"

  # Publish changed packages as loose OCI layers (push to main only).
  build-and-publish:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed_packages != '[]' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.changed_packages) }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      # The matrix is built from the diff, which includes deletions — skip a
      # package that was removed in this push.
      - name: Publish loose-layer package
        run: |
          if [ ! -d "src/${{ matrix.package }}/src" ]; then
            echo "src/${{ matrix.package }} no longer present (deleted) — skipping publish"
            exit 0
          fi
          ./bin/push-oci-package.sh "${{ matrix.package }}" ghcr.io/${{ github.repository_owner }} "${{ github.event.repository.name }}"

  # Regenerate + commit catalog.json on merge to main so the hosted index
  # (raw.githubusercontent.com/<owner>/<repo>/main/catalog.json) stays in sync.
  build-catalog:
    needs: build-and-publish
    # Run on any push to main, even when no package qualified for publish.
    if: ${{ always() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Generate catalog.json
        run: ./bin/build-catalog.sh "${{ github.repository_owner }}"

      - name: Commit catalog.json if changed
        run: |
          if git diff --quiet -- catalog.json; then
            echo "catalog.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git commit -m "chore(catalog): regenerate catalog.json [skip ci]"
          git push

  # Verify package structure on PRs (loose-layer contract).
  verify-packages:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed_packages != '[]' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.changed_packages) }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate package layout
        run: |
          PKG="src/${{ matrix.package }}"
          # A package may be deleted in a PR (e.g. retiring one) — that's valid.
          if [ ! -d "$PKG" ]; then
            echo "$PKG not present (deleted) — nothing to validate"
            exit 0
          fi

          [ -f "$PKG/package.json" ] || { echo "Error: $PKG/package.json not found"; exit 1; }
          VERSION=$(jq -r .version "$PKG/package.json")
          NAME=$(jq -r .name "$PKG/package.json")
          [ "$VERSION" != "null" ] && [ -n "$VERSION" ] || { echo "Error: missing version in package.json"; exit 1; }
          [ "$NAME" != "null" ] && [ -n "$NAME" ] || { echo "Error: missing name in package.json"; exit 1; }

          # Loose-layer format: the Hola server requires compose.yaml + manifest.json.
          [ -f "$PKG/src/compose.yaml" ] || { echo "Error: $PKG/src/compose.yaml not found (Hola requires compose.yaml)"; exit 1; }
          [ -f "$PKG/src/manifest.json" ] || { echo "Error: $PKG/src/manifest.json not found (Hola requires manifest.json)"; exit 1; }

          # The Hola server attaches `ingress.service` to the Traefik network and
          # injects auth env into it. For a multi-service app whose web service is
          # not named after the app id (or not listed first), an omitted or wrong
          # ingress.service silently mis-routes the app, so require it to name a
          # real service in compose.yaml.
          SERVICE=$(jq -r '.ingress.service // empty' "$PKG/src/manifest.json")
          [ -n "$SERVICE" ] || { echo "Error: $PKG/src/manifest.json must declare ingress.service (the compose service Traefik routes to)"; exit 1; }
          grep -qE "^  ${SERVICE}:" "$PKG/src/compose.yaml" \
            || { echo "Error: ingress.service '$SERVICE' is not a service in $PKG/src/compose.yaml"; exit 1; }

          echo "Package ${{ matrix.package }} validated (version: $VERSION, ingress.service: $SERVICE)"
