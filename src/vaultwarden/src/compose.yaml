services:
  vaultwarden:
    image: vaultwarden/server:1.32.7@sha256:7a0aa23c0947be3582898deb5170ea4359493ed9a76af2badf60a7eb45ac36af
    environment:
      # Public URL Vaultwarden is served at — required for WebAuthn/U2F, attachments,
      # and email links. Hola fills in the app's public host.
      - DOMAIN=https://${HOLA_APP_HOST}
      # Disable open registration once you've created your account.
      - SIGNUPS_ALLOWED=true
    volumes:
      - ${HOLA_APP_DATA}/data:/data
