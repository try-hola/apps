services:
  remo-web:
    image: ghcr.io/get2knowio/remo-web:2.2.0-rc7@sha256:b0f22a54dae0430436831688869598404d5b69e73f7012f9d7279801b083cd37
    environment:
      # Host-header allowlist (no wildcards). Traefik serves the public host;
      # loopback is kept so the container healthcheck below is accepted.
      REMO_WEB_ALLOWED_HOSTS: "${HOLA_APP_HOST},127.0.0.1,localhost"
      # Browser/WebSocket origin — Traefik terminates TLS, so this is https.
      REMO_WEB_ALLOWED_ORIGINS: "https://${HOLA_APP_HOST}"
      # Adopted mode (get2knowio/remo 011-web-adopt): the service boots
      # UNCONFIGURED, generates its own service SSH identity under the config
      # volume, and waits in a healthy "awaiting adoption" state. This token
      # gates the setup API that `remo web adopt` calls; while it is unset the
      # /api/v1/setup/* routes 404 and the service can never be adopted.
      # Generated and injected by Hola (see manifest defaultEnv).
      REMO_WEB_API_TOKEN: "${REMO_WEB_API_TOKEN}"
      # Forward-auth: behind Hola's Authentik/Traefik forward-auth, remo-web
      # trusts the proxy-injected identity header. `forward` selects remo-web's
      # forward-auth provider; the header is the one Authentik's outpost passes
      # through (Traefik copies it onto the request). Both from manifest defaultEnv.
      REMO_WEB_OPERATOR_AUTH: "${REMO_WEB_OPERATOR_AUTH}"
      REMO_WEB_FORWARD_AUTH_HEADER: "${REMO_WEB_FORWARD_AUTH_HEADER}"
    volumes:
      # Writable state volume (REMO_HOME). remo-web generates its service SSH
      # identity here (web-identity/) and stores the registry pushed by
      # `remo web adopt`. Nothing from a workstation is mounted — adopted mode.
      # The image's entrypoint starts as root, chowns this dir to the remo user,
      # then drops privileges — so a root-owned Hola bind mount just works (no
      # chown sidecar needed; requires remo-web >= 2.2.0-rc3).
      - ${HOLA_APP_DATA}/config:/home/remo/.config/remo
    tmpfs:
      # Per-instance SSH ControlMaster sockets. The entrypoint re-fixes this on
      # every (re)start, so no mode pin is needed.
      - /run/remo-ssh
    healthcheck:
      # /api/v1/health returns healthy in the awaiting-adoption state, so the
      # container goes green as soon as it boots (before it is adopted).
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
