# Paperless-ngx — document management. Packaged for Hola: Traefik-only ingress
# (no host ports), all persistence bind-mounted under ${HOLA_APP_DATA}.
#
# Three containers: the paperless `webserver` (web UI + workers), a Redis broker
# for the task queue, and PostgreSQL for metadata. Web UI listens on :8000 and is
# routed by Traefik (see manifest.ingress.port).
services:
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
    environment:
      # Datastores (internal — never published to the host).
      PAPERLESS_REDIS: "redis://broker:6379"
      PAPERLESS_DBHOST: "db"
      PAPERLESS_DBPORT: "5432"
      PAPERLESS_DBNAME: "paperless"
      PAPERLESS_DBUSER: "paperless"
      PAPERLESS_DBPASS: "paperless"
      # Public URL — Hola injects the app's Traefik host. No trailing slash.
      PAPERLESS_URL: "https://${HOLA_APP_HOST}"
      # Unique per-install signing key (collected by the install wizard).
      PAPERLESS_SECRET_KEY: "${PAPERLESS_SECRET_KEY}"
      # Run paperless as this uid/gid so bind-mounted dirs are writable.
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
      # Trusted-header (remote user) auth — paired with Hola's Traefik
      # forward-auth gate (Authentik embedded outpost). Authentik sets the
      # `X-authentik-username` response header on authenticated requests; Django
      # exposes incoming headers as HTTP_<UPPERCASE_WITH_UNDERSCORES>, so the
      # header name paperless reads is HTTP_X_AUTHENTIK_USERNAME.
      PAPERLESS_ENABLE_HTTP_REMOTE_USER: "true"
      PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME: "HTTP_X_AUTHENTIK_USERNAME"
      # After logging out, bounce through Authentik's sign-out so the SSO session
      # is cleared too (otherwise the gate would silently log you back in).
      PAPERLESS_LOGOUT_REDIRECT_URL: "https://${HOLA_APP_HOST}/outpost.goauthentik.io/sign_out"
      # Optional fallback superuser — only created when both are set. Leave the
      # password blank to skip and use the `createsuperuser` flow (see README).
      PAPERLESS_ADMIN_USER: "${PAPERLESS_ADMIN_USER:-admin}"
      PAPERLESS_ADMIN_PASSWORD: "${PAPERLESS_ADMIN_PASSWORD:-}"
      # Stamp the superuser's email with the installing dashboard user's address
      # (Hola's ${HOLA_USER_EMAIL} token) so it's populated for notifications and the
      # Django admin. Empty for admin-key/CLI installs — login is via forward-auth by
      # username, so this is cosmetic and never blocks account creation.
      PAPERLESS_ADMIN_MAIL: "${HOLA_USER_EMAIL:-}"
    expose:
      - "8000"
    volumes:
      - ${HOLA_APP_DATA}/data:/usr/src/paperless/data
      - ${HOLA_APP_DATA}/media:/usr/src/paperless/media
      - ${HOLA_APP_DATA}/export:/usr/src/paperless/export
      - ${HOLA_APP_DATA}/consume:/usr/src/paperless/consume
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy

  broker:
    image: redis:8.8-alpine@sha256:8096655e437712b07503796fb64d81359256cfcff0ab29d95a7da72863786efb
    volumes:
      - ${HOLA_APP_DATA}/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  db:
    # pgautoupgrade: on boot, detects an older PGDATA and runs `pg_upgrade` in place
    # before starting — so an existing install's data migrates across the Postgres
    # major automatically. A fresh install just initializes a new PG18 cluster.
    image: pgautoupgrade/pgautoupgrade:18-alpine@sha256:b0a1664b89698dba72276b3a4a2da9f2c879e9bb1d770fa273391bf6a4038e78
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
      # REQUIRED. PG18's image moved the default PGDATA to /var/lib/postgresql/18/docker;
      # pin it back so the data persists on the volume below and pgautoupgrade finds an
      # existing PG16/17 cluster here to upgrade.
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ${HOLA_APP_DATA}/pgdata:/var/lib/postgresql/data
      # Destination for the pre-backup pg_dump hook (manifest `backup.preHook`), under
      # the app data root so Hola's pre-upgrade/backrest snapshot captures the dump.
      - ${HOLA_APP_DATA}/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless -d paperless"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
