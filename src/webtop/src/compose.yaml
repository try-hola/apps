services:
  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-kde-f0194e9c-ls167@sha256:ed6255021979189defbe994d87280bda9fff8a9dba33bbdb2a7bb0962ac0a7e0
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      # NOTE: the image's built-in HTTP Basic auth (CUSTOM_USER/PASSWORD) is
      # intentionally NOT wired here. Hola always gates this app at the SSO layer
      # via forward-auth (see manifest.auth), and the image enables its nginx
      # Basic auth whenever PASSWORD is *defined at all* — even empty — which
      # would write a broken /etc/nginx/.htpasswd and lock every user out. Hola
      # can't express an "unset when blank" env var, so the built-in Basic auth
      # is left off and SSO is the sole boundary.
    volumes:
      - ${HOLA_APP_DATA}/config:/config
    # The web UI is served on 3000 (HTTP) / 3001 (HTTPS). Hola routes ingress
    # through Traefik to container port 3000 (manifest.ingress.port) — no host ports.
    expose:
      - "3000"
    # KasmVNC/desktop images recommend a larger /dev/shm so browsers (e.g.
    # Chromium) inside the desktop don't crash.
    shm_size: "1gb"
    # Modern GUI desktop apps can hit Docker's default syscall (seccomp)
    # restrictions. Uncomment if apps inside the desktop misbehave:
    # security_opt:
    #   - seccomp:unconfined
