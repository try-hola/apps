services:
  n8n:
    image: n8nio/n8n:2.26.3
    restart: unless-stopped
    environment:
      # n8n sits behind Traefik (TLS terminated at the edge). N8N_HOST + WEBHOOK_URL
      # are host-specific and set per install (see manifest defaultEnv). The rest are
      # fixed: trust one proxy hop so n8n reads X-Forwarded-Proto/For from Traefik
      # (makes https detection + secure cookies work), and advertise https.
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"
      # Opt into task runners (n8n logs a deprecation warning without this).
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - n8n-data:/home/node/.n8n
volumes:
  n8n-data:
