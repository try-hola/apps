# Postiz — social media scheduling. Packaged for Hola: Traefik-only ingress
# (no host ports), all persistence bind-mounted under ${HOLA_APP_DATA}.
#
# Postiz's scheduling runs on Temporal. Temporal's *visibility* store can be
# Postgres or Elasticsearch; we use Postgres (temporal-postgres) and omit the
# Elasticsearch container entirely (ENABLE_ES unset → SQL visibility) to keep
# the footprint reasonable for a homelab. See try-hola/hola#162 for making ES
# an opt-in profile once Hola supports per-app compose profiles.
services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:v2.21.10@sha256:1d5a5dc6b896747d1483c01dc2562165bd313ad601b32f6cabb7f7dd08a911a9
    environment:
      # Public URLs — Hola injects the app's Traefik host.
      MAIN_URL: "https://${HOLA_APP_HOST}"
      FRONTEND_URL: "https://${HOLA_APP_HOST}"
      NEXT_PUBLIC_BACKEND_URL: "https://${HOLA_APP_HOST}/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      # Unique per-install signing secret (collected by the install wizard).
      JWT_SECRET: "${JWT_SECRET}"
      # Internal datastores (not exposed to the host).
      DATABASE_URL: "postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://postiz-redis:6379"
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: "true"
      RUN_CRON: "true"
      # Set to true after creating your account to lock down sign-ups.
      DISABLE_REGISTRATION: "${DISABLE_REGISTRATION:-false}"
      # Local on-disk storage for uploads.
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      NX_ADD_PLUGINS: "false"
      API_LIMIT: "30"
    volumes:
      - ${HOLA_APP_DATA}/config:/config
      - ${HOLA_APP_DATA}/uploads:/uploads
    # Probe the BACKEND through the in-image nginx (/api → localhost:3000), NOT
    # just nginx/frontend on `/`. The postiz image runs the Next.js frontend (4200),
    # the NestJS backend (3000) and nginx (5000) as separate pm2 processes; nginx and
    # the frontend come up in seconds while the backend is slow (it runs `prisma db
    # push` + NestJS init + Temporal connect on boot). Probing `/` only proved the
    # frontend was up, so the container reported healthy while every `/api` call —
    # including the "Sign in with Authentik" login-link endpoint — still 502'd
    # (nginx → dead backend). Hitting `/api/auth/can-register` (a public backend GET)
    # makes "healthy" mean the backend actually serves, so Hola won't present a
    # running app whose auth is broken. The backend boot is heavy, especially on
    # small homelab hosts, so the start_period is generous.
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://localhost:5000/api/auth/can-register',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(8000,()=>{r.destroy();process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 300s
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine@sha256:dc17045ccfd343b49600570ea734b9c4991cf1c3f3302e67df51e3b402dd55c4
    environment:
      POSTGRES_USER: postiz-user
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_DB: postiz-db-local
    volumes:
      - ${HOLA_APP_DATA}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postiz-redis:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    volumes:
      - ${HOLA_APP_DATA}/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Temporal server, configured for Postgres-backed visibility (no Elasticsearch).
  temporal:
    image: temporalio/auto-setup:1.29.7@sha256:f14912b699cf73015ad5c4fc18d522d4b014db90e794039214dfb7c022c2644f
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      # Don't register Temporal's demo custom search attributes (CustomTextField,
      # CustomStringField, …). Postgres-backed visibility allows only 3 of type Text,
      # and two of those demo attrs are Text; the Postiz backend registers two more
      # of its own (organizationId, postId) on boot, which would make 4 > 3 — Temporal
      # rejects it, the backend's NestJS init throws, and it never binds :3000, so every
      # /api call (incl. the "Sign in with Authentik" login-link endpoint) 502s. Skipping
      # the unused demo attrs keeps Text usage at 2/3. (Elasticsearch visibility, which
      # upstream uses, has no such limit — see README.)
      SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES: "true"
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-postgres:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - ${HOLA_APP_DATA}/temporal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
